name: Check law source updates

on:
  workflow_dispatch:
  schedule:
    # 每周一北京时间 09:30 左右运行（UTC 01:30）。法规更新不需要分钟级实时，周度检查更稳。
    - cron: "30 1 * * 1"

permissions:
  contents: write

jobs:
  check-law-updates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run law update checker
        run: |
          python scripts/law_update_checker.py --mode check --timeout 30

      - name: Commit monitoring results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/law_monitor_snapshot.csv data/law_update_log.csv
          if git diff --cached --quiet; then
            echo "No law monitoring changes to commit."
          else
            git commit -m "chore: update law monitoring snapshot"
            git push
          fi
